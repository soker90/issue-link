site:
  name: DevLinks
  site: 'https://link.eduardoparra.es'
  base: '/'
  trailingSlash: false

metadata:
  title:
    default: DevLinks
    template: '%s — DevLinks'
  description: 'Directorio de recursos de programacion: herramientas, repositorios, librerias y servicios para desarrolladores.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: DevLinks
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@_eduparra'
    site: '@_eduparra'
    cardType: summary_large_image

i18n:
  language: es
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    # Una sola pagina con todos los recursos: la busqueda/filtros son en cliente,
    # asi cubren todo el directorio (no solo la pagina actual) y no hay paginacion.
    postsPerPage: 1000

    link:
      isEnabled: true
      permalink: '/%slug%'
      robots:
        index: true

    list:
      isEnabled: true
      pathname: '/'
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'categoria'
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag'
      robots:
        index: true

analytics:
  vendors:
    googleAnalytics:
      id: null

ui:
  theme: 'dark:only'

  tokens:
    default:
      fonts:
        sans: Inter
        mono: DM Mono
        serif: Instrument Serif
        heading: Inter
      colors:
        default: rgb(247 245 240)
        heading: rgb(247 245 240)
        muted: rgb(174 166 156)
        bgPage: rgb(43 38 34)
        primary: rgb(247 245 240)
        secondary: rgb(56 51 48)
        accent: rgb(247 245 240)
        info: rgb(119 182 234)
        success: rgb(54 211 153)
        warning: rgb(251 189 35)
        error: rgb(248 114 114)
        link: rgb(247 245 240)
        linkActive: rgb(247 245 240)
    dark:
      fonts: {}
      colors:
        default: rgb(247 245 240)
        heading: rgb(247 245 240)
        muted: rgb(174 166 156)
        bgPage: rgb(43 38 34)
        primary: rgb(247 245 240)
        secondary: rgb(56 51 48)
        accent: rgb(247 245 240)
        info: rgb(119 182 234)
        success: rgb(54 211 153)
        warning: rgb(251 189 35)
        error: rgb(248 114 114)
        link: rgb(247 245 240)
        linkActive: rgb(247 245 240)
